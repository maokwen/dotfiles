<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
<alias>
  <family>sans-serif</family>
  <prefer>
    <family>Noto Sans CJK SC</family>
  </prefer>
</alias>
<alias>
  <family>serif</family>
  <prefer>
    <family>LWGW Wenkai</family>
  </prefer>
</alias>
<alias>
  <family>monospace</family>
  <prefer>
    <family>CaskaydiaCove Nerd Font Propo</family>
  </prefer>
</alias>
</fontconfig>

